version: '3.8'

services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: lnavas-353131330d34
      MYSQL_USER: lnavasusr
      MYSQL_PASSWORD: npmyg0jkth
    ports:
      - "3306:3306"
    volumes:
      - ./luisnavasproducciones/database.sql:/docker-entrypoint-initdb.d/init.sql

  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./luisnavasproducciones:/var/www/html
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_NAME=lnavas-353131330d34
      - DB_USER=lnavasusr
      - DB_PASS=npmyg0jkth
