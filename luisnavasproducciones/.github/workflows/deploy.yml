name: Deploy via FTP
on:
  push:
    branches: [ "feat/luisnavas-website" ]
    paths:
      - 'luisnavasproducciones/**'
  workflow_dispatch: {}
concurrency:
  group: ftp-deploy-prod
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_PATH }}      # termina en /
          local-dir: luisnavasproducciones/
          protocol: ftp                           # usa ftp (ftps te dio ECONNRESET)
          port: 21
          log-level: verbose
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/.env
            **/vendor/**
            assets/uploads/**
            Dockerfile
            docker-compose.yml
            README.md
